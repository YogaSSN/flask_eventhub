{% extends 'layout.html' %}
{% block content %}
<div class="auth-container">
    <div class="glass-card">
        <h2 style="text-align: center; margin-top: 0; color: #e2e8f0;">Create Account</h2>
        <p style="text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem;">Join EventHub today</p>
        <form method="POST" action="{{ url_for('signup') }}">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="form-group">
                <label>I am a...</label>
                <select name="role" class="form-control" required style="appearance: auto;">
                    <option value="student">🎓 Student</option>
                    <option value="faculty">👨‍🏫 Faculty</option>
                </select>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #94a3b8;">
            Already have an account? <a href="{{ url_for('login') }}" style="color: #c084fc;">Login</a>
        </p>
    </div>
</div>
{% endblock %}

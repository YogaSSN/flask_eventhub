{% extends 'layout.html' %}
{% block content %}
<div class="auth-container" style="max-width: 600px;">
    <div class="glass-card">
        <h2>Create New Event</h2>
        <form method="POST" action="{{ url_for('faculty_event_create') }}">
            <div class="form-group"><label>Event Name</label><input type="text" name="title" class="form-control" required></div>
            <div class="form-group"><label>Description</label><textarea name="description" class="form-control" rows="3" required></textarea></div>
            <div style="display:flex; gap:1rem;">
                <div class="form-group" style="flex:1;"><label>Date & Time</label><input type="datetime-local" name="date_time" class="form-control" required></div>
                <div class="form-group" style="flex:1;"><label>Venue</label><input type="text" name="venue" class="form-control" required></div>
            </div>
            <div style="display:flex; gap:1rem;">
                <div class="form-group" style="flex:1;"><label>Max Participants</label><input type="number" name="max_participants" class="form-control" required></div>
                <div class="form-group" style="flex:1;"><label>Registration Deadline</label><input type="datetime-local" name="deadline" class="form-control" required></div>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Publish Event</button>
        </form>
    </div>
</div>
{% endblock %}

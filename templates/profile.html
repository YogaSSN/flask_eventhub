{% extends 'layout.html' %}
{% block content %}
<div class="auth-container">
    <div class="glass-card" style="text-align: center;">
        <h2 style="margin-top: 0;">My Profile</h2>
        <div style="background: rgba(255,255,255,0.05); padding: 1.5rem; border-radius: 8px; margin-bottom: 1.5rem;">
            <p style="color: #94a3b8; font-size: 0.9rem; margin: 0 0 0.5rem 0;">Username</p>
            <h3 style="margin: 0 0 1rem 0;">{{ user.username }}</h3>
            
            <p style="color: #94a3b8; font-size: 0.9rem; margin: 0 0 0.5rem 0;">Account Type</p>
            <span class="status-badge {% if user.role == 'faculty' %}status-Approved{% else %}status-Pending{% endif %}">
                {{ user.role.capitalize() }}
            </span>
        </div>
        <button class="btn btn-outline" style="width: 100%;" onclick="alert('Simulation: Password reset link sent to your email!')">Change Password</button>
    </div>
</div>
{% endblock %}
